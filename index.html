<!DOCTYPE html>
<html lang="ru" data-theme="hair">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Suluu Business — Управление бизнесом</title>
  
  <!-- SEO и мета-теги -->
  <meta name="description" content="Автономная система учета для салонов красоты и beauty-мастеров">
  <meta name="theme-color" content="#7c3aed">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  
  <!-- PWA поддержка -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <!-- Шрифты Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Стили приложения -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Local Tailwind CSS Build -->
  <script src="js/tailwind.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased selection:bg-indigo-500 selection:text-white bg-mesh" style="background-color: #0b0f1a; color: #ffffff;">
  
  <!-- Единственный контейнер для morphdom SPA -->
  <div id="app" class="min-h-screen">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: transparent; color: white;">
      <div style="text-align: center;">
        <span style="font-size: 48px; display: block; margin-bottom: 16px; animation: pulse 1.5s infinite;">💎</span>
        <div style="font-weight: 700; font-size: 18px;">Инициализация Suluu Business...</div>
      </div>
    </div>
  </div>

  <noscript>
    <div style="padding: 40px; text-align: center; font-family: sans-serif;">
      <h2>Для работы Suluu Business требуется включенный JavaScript!</h2>
      <p>Пожалуйста, включите JavaScript в настройках вашего браузера.</p>
    </div>
  </noscript>

  <!-- Скрипт-регистратор Service Worker для PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker успешно зарегистрирован!', reg.scope))
          .catch((err) => console.log('Ошибка регистрации Service Worker:', err));
      });
    }
  </script>

  <!-- Сторонние библиотеки (локально и CDN) -->
  <script src="js/morphdom.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- JS Модули приложения -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/core/engine.js"></script>
  <script src="js/core/router.js"></script>
  
  <!-- Страницы-компоненты -->
  <script src="js/pages/auth.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/bookings.js"></script>
  <script src="js/pages/masters.js"></script>
  <script src="js/pages/clients.js"></script>
  <script src="js/pages/services.js"></script>
  <script src="js/pages/finance.js"></script>
  <script src="js/pages/settings.js"></script>
  
  <!-- Точка входа в приложение (всегда в самом конце) -->
  <script src="js/app.js"></script>
</body>
</html>
